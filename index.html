<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Holi My Love ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:radial-gradient(circle at center,#1a0026,#000);
color:white;
text-align:center;
}

/* Smooth fade intro */
body{animation:fade 2s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}

canvas{position:fixed;top:0;left:0;}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
}

/* Premium photo */
.photo{
width:300px;
max-width:90vw;
border-radius:25px;
box-shadow:0 0 70px rgba(255,0,150,0.9);
position:relative;
}

/* Face powder canvas */
.faceBlast{
position:absolute;
top:18%;
left:25%;
width:50%;
height:38%;
pointer-events:none;
}

/* Button */
button{
margin-top:25px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff0080,#ff8c00,#00f2ff);
color:white;
box-shadow:0 0 30px hotpink;
}

/* Auto realistic hand */
.hand{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:-160px;
width:95px;
animation:handMove 3s forwards;
}
@keyframes handMove{
0%{bottom:-160px;}
100%{bottom:50px;}
}

/* Typing letter */
.letter{
margin-top:30px;
max-width:340px;
font-size:18px;
min-height:140px;
white-space:pre-line;
}

/* Tiny multi-color hearts */
.heart{
position:absolute;
width:5px;
height:5px;
transform:rotate(45deg);
animation:float 8s linear infinite;
}
.heart:before,.heart:after{
content:"";
position:absolute;
width:5px;
height:5px;
border-radius:50%;
}
.heart:before{top:-2.5px;}
.heart:after{left:-2.5px;}

@keyframes float{
0%{transform:translateY(100vh) rotate(45deg);}
100%{transform:translateY(-10vh) rotate(45deg);}
}

/* Flash */
.flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:5;
transition:0.3s;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<!-- Background Smoke -->
<canvas id="smoke"></canvas>

<div class="container">

<div style="position:relative;">
<img src="yourphoto.jpg" class="photo">
<canvas class="faceBlast" id="faceBlast"></canvas>
</div>

<button id="btn">Happy Holi ❤️</button>
<img src="https://i.imgur.com/6o5V7XK.png" class="hand">

<div class="letter" id="letter"></div>

</div>

<audio id="music" src="holi.mp3"></audio>

<script>

/* Cinematic Smoke Background */
const smoke=document.getElementById("smoke");
const sctx=smoke.getContext("2d");
smoke.width=innerWidth;
smoke.height=innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*smoke.width,
y:Math.random()*smoke.height,
size:Math.random()*50+30,
speed:Math.random()*0.4+0.2,
color:`hsla(${Math.random()*360},100%,50%,0.04)`
});
}

function animateSmoke(){
sctx.clearRect(0,0,smoke.width,smoke.height);
particles.forEach(p=>{
sctx.beginPath();
sctx.arc(p.x,p.y,p.size,0,Math.PI*2);
sctx.fillStyle=p.color;
sctx.fill();
p.y-=p.speed;
if(p.y<0)p.y=smoke.height;
});
requestAnimationFrame(animateSmoke);
}
animateSmoke();

/* Tiny colorful hearts */
for(let i=0;i<70;i++){
let h=document.createElement("div");
h.className="heart";
let c=`hsl(${Math.random()*360},100%,70%)`;
h.style.background=c;
h.style.left=Math.random()*100+"vw";
h.style.top=Math.random()*100+"vh";
h.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(h);
}

/* Auto press after 3 sec */
setTimeout(()=>{document.getElementById("btn").click();},3000);

let btn=document.getElementById("btn");
let music=document.getElementById("music");
let flash=document.getElementById("flash");
let letter=document.getElementById("letter");

btn.addEventListener("click",()=>{

music.play();

/* Flash */
flash.style.opacity="0.8";
setTimeout(()=>{flash.style.opacity="0";},300);

/* Face powder burst */
const face=document.getElementById("faceBlast");
const fctx=face.getContext("2d");
face.width=face.offsetWidth;
face.height=face.offsetHeight;

for(let i=0;i<250;i++){
let angle=Math.random()*2*Math.PI;
let dist=Math.random()*face.width/2;
fctx.beginPath();
fctx.arc(
face.width/2+Math.cos(angle)*dist,
face.height/2+Math.sin(angle)*dist,
Math.random()*3+2,
0,2*Math.PI);
fctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
fctx.globalAlpha=0.9;
fctx.fill();
}

/* Typing animation */
let text=`My Love ❤️

Iss Holi par main chahta hoon ki
tumhari zindagi har din naye rang se bhari rahe 🌈
Jaise aaj gulal tumhare chehre ko saja raha hai,
waise hi khushi tumhari life ko roshan karti rahe 💕
Happy Holi meri jaan ❤️`;

let i=0;
function type(){
if(i<text.length){
letter.innerHTML+=text.charAt(i);
i++;
setTimeout(type,30);
}
}
type();

});

</script>

</body>
</html>
